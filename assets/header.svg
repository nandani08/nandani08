<svg width="860" height="260" viewBox="0 0 860 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hi, I'm Nandani Awase">
  <defs>
    <!-- flowing gradient for the name — periodic stops so the slide loops seamlessly -->
    <linearGradient id="flow" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="860" y2="0" spreadMethod="repeat">
      <stop offset="0"    stop-color="#8b5cf6"/>
      <stop offset="0.25" stop-color="#ff9e80"/>
      <stop offset="0.5"  stop-color="#ffd98e"/>
      <stop offset="0.75" stop-color="#ff9e80"/>
      <stop offset="1"    stop-color="#8b5cf6"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="0 0" to="860 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- underline gradient -->
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="50%"  stop-color="#ff9e80"/>
      <stop offset="100%" stop-color="#ffd98e"/>
    </linearGradient>

    <!-- soft blur for the aurora blobs -->
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>

    <clipPath id="frame">
      <rect x="1" y="1" width="858" height="258" rx="16"/>
    </clipPath>
  </defs>

  <style>
    .hi {
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-size: 27px;
      fill: #c4b5fd;
      letter-spacing: 2px;
    }
    .name {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 800;
      font-size: 58px;
      fill: url(#flow);
    }

    /* entrance: rise softly into place */
    .enter1, .enter2, .enter3 { opacity: 0; animation: rise 0.9s cubic-bezier(0.2, 0.7, 0.3, 1) forwards; }
    .enter1 { animation-delay: 0.2s; }
    .enter2 { animation-delay: 0.55s; }
    .enter3 { animation-delay: 0.9s; }

    /* forever after: a gentle float */
    .float { animation: bob 4.5s ease-in-out infinite alternate; }

    /* underline draws itself */
    .swoosh {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: draw 1.3s ease-out 1.1s forwards;
    }

    /* twinkling sparkles */
    .spark { transform-origin: center; transform-box: fill-box; }
    .s1 { animation: twinkle 2.6s ease-in-out 0.0s infinite; }
    .s2 { animation: twinkle 3.2s ease-in-out 1.1s infinite; }
    .s3 { animation: twinkle 2.3s ease-in-out 0.6s infinite; }
    .s4 { animation: twinkle 3.6s ease-in-out 1.7s infinite; }
    .s5 { animation: twinkle 2.9s ease-in-out 0.3s infinite; }
    .s6 { animation: twinkle 2.4s ease-in-out 2.0s infinite; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(26px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bob {
      from { transform: translateY(3px); }
      to   { transform: translateY(-5px); }
    }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(0.55) rotate(0deg); }
      50%      { opacity: 1;   transform: scale(1)   rotate(45deg); }
    }
  </style>

  <g clip-path="url(#frame)">
    <!-- night-plum sky -->
    <rect x="0" y="0" width="860" height="260" fill="#1e1b2e"/>

    <!-- aurora: blurred blobs slowly drifting behind everything -->
    <ellipse cx="180" cy="220" rx="220" ry="110" fill="#8b5cf6" opacity="0.38" filter="url(#soft)">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 90 -40; 0 0" dur="13s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </ellipse>
    <ellipse cx="700" cy="60" rx="200" ry="100" fill="#ff9e80" opacity="0.26" filter="url(#soft)">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; -110 50; 0 0" dur="16s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </ellipse>
    <ellipse cx="480" cy="250" rx="180" ry="90" fill="#7ee8c7" opacity="0.16" filter="url(#soft)">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 60 -30; 0 0" dur="11s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </ellipse>
    <ellipse cx="120" cy="40" rx="150" ry="80" fill="#ffd98e" opacity="0.18" filter="url(#soft)">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 70 40; 0 0" dur="14s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </ellipse>

    <!-- sparkles -->
    <path class="spark s1" fill="#ffd98e" transform="translate(150,88)"  d="M0 -8 L2 -2 L8 0 L2 2 L0 8 L-2 2 L-8 0 L-2 -2 Z"/>
    <path class="spark s2" fill="#a78bfa" transform="translate(724,170)" d="M0 -10 L2.4 -2.4 L10 0 L2.4 2.4 L0 10 L-2.4 2.4 L-10 0 L-2.4 -2.4 Z"/>
    <path class="spark s3" fill="#ff9e80" transform="translate(210,196)" d="M0 -6 L1.5 -1.5 L6 0 L1.5 1.5 L0 6 L-1.5 1.5 L-6 0 L-1.5 -1.5 Z"/>
    <path class="spark s4" fill="#7ee8c7" transform="translate(688,66)"  d="M0 -7 L1.7 -1.7 L7 0 L1.7 1.7 L0 7 L-1.7 1.7 L-7 0 L-1.7 -1.7 Z"/>
    <path class="spark s5" fill="#c4b5fd" transform="translate(78,168)"  d="M0 -5 L1.3 -1.3 L5 0 L1.3 1.3 L0 5 L-1.3 1.3 L-5 0 L-1.3 -1.3 Z"/>
    <path class="spark s6" fill="#ffd98e" transform="translate(790,110)" d="M0 -5 L1.3 -1.3 L5 0 L1.3 1.3 L0 5 L-1.3 1.3 L-5 0 L-1.3 -1.3 Z"/>

    <!-- the words -->
    <g class="float">
      <g class="enter1">
        <text class="hi" x="430" y="92" text-anchor="middle" textLength="96">Hi, I'm</text>
      </g>
      <g class="enter2">
        <text class="name" x="430" y="168" text-anchor="middle" textLength="500">Nandani Awase</text>
      </g>
      <g class="enter3">
        <path class="swoosh" d="M 195 198 Q 430 218 665 194" fill="none"
          stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <!-- frame -->
  <rect x="1" y="1" width="858" height="258" rx="16" fill="none" stroke="#6d5aa8" stroke-width="2"/>
</svg>
