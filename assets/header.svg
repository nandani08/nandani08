<!--
  ════════════════════════════════════════════════════════════════
  ANIMATED HEADER — hand-coded, easy to customize
  ════════════════════════════════════════════════════════════════
  HOW TO MODIFY:

  1. TEXT      → search for "Hi, I'm" and "Nandani Awase" below.
                 If you change the name, also update the two
                 "TYPING VALUES" <animate> lists (clip width + caret x):
                 one value per character, evenly spaced.
  2. COLORS    → swap any hex you like:
       #8b5cf6  violet        #a78bfa  lavender
       #ff9e80  peach         #ffd98e  gold
       #7ee8c7  mint          #1e1b2e  dark plum (background)
  3. SPEED     → every  dur="Xs"  and  animation: ... Xs  is a duration.
                 Smaller number = faster.
                 Typing speed = dur="1.95s" on the two TYPING VALUES lines.
  4. FLOAT     → "bob" keyframes control the gentle up-down drift
  5. SPARKLES  → each <path class="spark ..."> is one star.
                 Delete a line to remove one, copy a line to add one.
                 translate(x,y) sets its position.
  6. PIXELS    → the pixel blocks are part of the #body clip shape,
                 so the aurora shows through them seamlessly.
                 Add/remove/move the <rect> lines inside <clipPath id="body">
                 to reshape the dissolving edge.
                 "falling pixels" (class p1..p8) drop and fade below it.
  ════════════════════════════════════════════════════════════════
-->
<svg width="860" height="264" viewBox="0 0 860 264" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hi, I'm Nandani Awase">
  <defs>
    <!-- flowing gradient that slides across the name forever -->
    <linearGradient id="flow" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="860" y2="0" spreadMethod="repeat">
      <stop offset="0"    stop-color="#8b5cf6"/>
      <stop offset="0.25" stop-color="#ff9e80"/>
      <stop offset="0.5"  stop-color="#ffd98e"/>
      <stop offset="0.75" stop-color="#ff9e80"/>
      <stop offset="1"    stop-color="#8b5cf6"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="0 0" to="860 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- soft blur for the aurora glow -->
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>

    <!-- body shape: rounded top + the pixel blocks of the dissolving edge.
         Everything (background + aurora) is drawn through this one clip,
         so the pixels show the same animated aurora — no visible seam. -->
    <clipPath id="body">
      <path d="M0,16 Q0,0 16,0 H844 Q860,0 860,16 V176 H0 Z"/>
      <!-- pixel row 1 -->
      <rect x="0"   y="176" width="48" height="16"/>
      <rect x="64"  y="176" width="80" height="16"/>
      <rect x="160" y="176" width="64" height="16"/>
      <rect x="240" y="176" width="80" height="16"/>
      <rect x="336" y="176" width="64" height="16"/>
      <rect x="416" y="176" width="64" height="16"/>
      <rect x="496" y="176" width="80" height="16"/>
      <rect x="592" y="176" width="48" height="16"/>
      <rect x="656" y="176" width="80" height="16"/>
      <rect x="752" y="176" width="48" height="16"/>
      <rect x="816" y="176" width="44" height="16"/>
      <!-- pixel row 2 -->
      <rect x="16"  y="192" width="16" height="16"/>
      <rect x="80"  y="192" width="32" height="16"/>
      <rect x="176" y="192" width="16" height="16"/>
      <rect x="256" y="192" width="32" height="16"/>
      <rect x="352" y="192" width="16" height="16"/>
      <rect x="432" y="192" width="16" height="16"/>
      <rect x="512" y="192" width="32" height="16"/>
      <rect x="608" y="192" width="16" height="16"/>
      <rect x="688" y="192" width="16" height="16"/>
      <rect x="768" y="192" width="32" height="16"/>
      <rect x="832" y="192" width="16" height="16"/>
      <!-- pixel row 3 -->
      <rect x="96"  y="208" width="16" height="16"/>
      <rect x="288" y="208" width="16" height="16"/>
      <rect x="464" y="208" width="16" height="16"/>
      <rect x="640" y="208" width="16" height="16"/>
      <rect x="784" y="208" width="16" height="16"/>
    </clipPath>

    <!-- typing reveal: the clip window grows one character-width per step -->
    <clipPath id="typing">
      <rect x="178" y="82" width="0" height="70">
        <!-- TYPING VALUES (clip width): one value per character, 13 chars -->
        <animate attributeName="width" begin="0.7s" dur="1.95s" fill="freeze"
          calcMode="discrete"
          values="0;39;78;117;156;195;234;273;312;351;390;429;468;507"/>
      </rect>
    </clipPath>
  </defs>

  <style>
    .hi {
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-size: 27px;
      fill: #c4b5fd;
      letter-spacing: 2px;
    }
    .name {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 800;
      font-size: 58px;
      fill: url(#flow);
    }

    /* entrance: "Hi, I'm" rises softly into place */
    .enter1 { opacity: 0; animation: rise 0.9s cubic-bezier(0.2, 0.7, 0.3, 1) 0.2s forwards; }

    /* forever after: a gentle float */
    .float { animation: bob 4.5s ease-in-out infinite alternate; }

    /* twinkling sparkles */
    .spark { transform-origin: center; transform-box: fill-box; }
    .s1 { animation: twinkle 2.6s ease-in-out 0.0s infinite; }
    .s2 { animation: twinkle 3.2s ease-in-out 1.1s infinite; }
    .s3 { animation: twinkle 2.3s ease-in-out 0.6s infinite; }
    .s4 { animation: twinkle 3.6s ease-in-out 1.7s infinite; }

    /* falling pixels: drop down and fade out, forever */
    .p1 { animation: fall 3.0s linear 0.0s infinite; }
    .p2 { animation: fall 3.6s linear 1.2s infinite; }
    .p3 { animation: fall 2.8s linear 0.6s infinite; }
    .p4 { animation: fall 4.0s linear 1.8s infinite; }
    .p5 { animation: fall 3.2s linear 2.4s infinite; }
    .p6 { animation: fall 3.8s linear 0.3s infinite; }
    .p7 { animation: fall 3.0s linear 1.5s infinite; }
    .p8 { animation: fall 2.6s linear 2.0s infinite; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(26px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bob {
      from { transform: translateY(3px); }
      to   { transform: translateY(-5px); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(0.55) rotate(0deg); }
      50%      { opacity: 1;   transform: scale(1)   rotate(45deg); }
    }
    @keyframes fall {
      0%   { opacity: 0; transform: translateY(0); }
      12%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(40px); }
    }
  </style>

  <!-- ══ everything below is drawn through the #body clip:
       rounded rectangle + pixel edge share the same background & aurora ══ -->
  <g clip-path="url(#body)">
    <!-- night-plum sky (covers the pixel rows too) -->
    <rect x="0" y="0" width="860" height="224" fill="#1e1b2e"/>

    <!-- aurora: blurred color clouds drifting slowly behind the text -->
    <ellipse cx="180" cy="160" rx="220" ry="110" fill="#8b5cf6" opacity="0.38" filter="url(#soft)">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 90 -40; 0 0" dur="13s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </ellipse>
    <ellipse cx="700" cy="40" rx="200" ry="100" fill="#ff9e80" opacity="0.26" filter="url(#soft)">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; -110 50; 0 0" dur="16s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </ellipse>
    <ellipse cx="480" cy="180" rx="180" ry="90" fill="#7ee8c7" opacity="0.16" filter="url(#soft)">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 60 -30; 0 0" dur="11s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </ellipse>
    <ellipse cx="120" cy="25" rx="150" ry="80" fill="#ffd98e" opacity="0.18" filter="url(#soft)">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 70 40; 0 0" dur="14s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </ellipse>

    <!-- sparkles -->
    <path class="spark s1" fill="#ffd98e" transform="translate(150,60)"  d="M0 -8 L2 -2 L8 0 L2 2 L0 8 L-2 2 L-8 0 L-2 -2 Z"/>
    <path class="spark s2" fill="#a78bfa" transform="translate(724,120)" d="M0 -10 L2.4 -2.4 L10 0 L2.4 2.4 L0 10 L-2.4 2.4 L-10 0 L-2.4 -2.4 Z"/>
    <path class="spark s3" fill="#ff9e80" transform="translate(210,150)" d="M0 -6 L1.5 -1.5 L6 0 L1.5 1.5 L0 6 L-1.5 1.5 L-6 0 L-1.5 -1.5 Z"/>
    <path class="spark s4" fill="#7ee8c7" transform="translate(688,44)"  d="M0 -7 L1.7 -1.7 L7 0 L1.7 1.7 L0 7 L-1.7 1.7 L-7 0 L-1.7 -1.7 Z"/>

    <!-- the words -->
    <g class="float">
      <g class="enter1">
        <text class="hi" x="430" y="60" text-anchor="middle" textLength="96">Hi, I'm</text>
      </g>
      <!-- name is revealed character by character through the #typing window -->
      <g clip-path="url(#typing)">
        <text class="name" x="430" y="136" text-anchor="middle" textLength="500">Nandani Awase</text>
      </g>
      <!-- gold caret: appears, follows the typing, then blinks forever -->
      <rect x="182" y="92" width="5" height="54" fill="#ffd98e" opacity="0">
        <animate attributeName="opacity" begin="0.7s" dur="0.01s" fill="freeze" values="0;1"/>
        <!-- TYPING VALUES (caret x): one value per character, 13 chars -->
        <animate attributeName="x" begin="0.7s" dur="1.95s" fill="freeze"
          calcMode="discrete"
          values="182;221;260;299;338;377;416;455;494;533;572;611;650;687"/>
        <animate attributeName="opacity" begin="2.9s" dur="1.1s" repeatCount="indefinite"
          calcMode="discrete" values="1;0"/>
      </rect>
    </g>
  </g>

  <!-- ══ falling pixels: break off the edge, drop, and fade ══
       tinted to match the aurora region they fall from -->
  <rect class="p1" x="120" y="194" width="12" height="12" fill="#a78bfa"/>
  <rect class="p5" x="210" y="212" width="8"  height="8"  fill="#8b5cf6"/>
  <rect class="p2" x="300" y="204" width="10" height="10" fill="#c4b5fd"/>
  <rect class="p7" x="420" y="214" width="10" height="10" fill="#7ee8c7"/>
  <rect class="p3" x="520" y="198" width="14" height="14" fill="#7ee8c7"/>
  <rect class="p6" x="620" y="202" width="12" height="12" fill="#8b7ac2"/>
  <rect class="p4" x="700" y="210" width="10" height="10" fill="#6d5aa8"/>
  <rect class="p8" x="790" y="194" width="8"  height="8"  fill="#8b7ac2"/>
</svg>
